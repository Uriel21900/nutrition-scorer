<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriScore - Smart Nutrition Analyzer</title>
    <meta name="description" content="Calculate the true health score of your food based on macros and ingredients.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#3b82f6">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <main class="container">
        <header>
            <h1>NutriScore</h1>
            <p>Uncover the true health value of your food</p>
        </header>

        <div class="app-layout">
            <div class="input-panel glass-panel">
                <div class="barcode-section">
                    <h2>Scan Product</h2>
                    <div id="reader" style="width: 100%; display: none; margin-bottom: 1rem; border-radius: 12px; overflow: hidden;"></div>
                    <div class="barcode-input-row">
                        <input type="text" id="barcode-input" placeholder="Enter barcode number...">
                        <button id="scan-btn" class="secondary-btn small-btn">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7V4h3"></path><path d="M20 7V4h-3"></path><path d="M4 17v3h3"></path><path d="M20 17v3h-3"></path><path d="M8 12h8"></path></svg>
                        </button>
                    </div>
                    <button id="lookup-btn" class="secondary-btn" style="margin-top: 0.5rem;">Fetch Details</button>
                    <p id="barcode-status" class="status-text"></p>
                </div>

                <hr class="divider">

                <h2>Nutrition Facts</h2>
                
                <div class="input-group">
                    <label for="calories">Calories</label>
                    <input type="number" id="calories" placeholder="e.g. 250" min="0" required>
                </div>

                <div class="macros-grid">
                    <div class="input-group">
                        <label for="protein">Protein (g)</label>
                        <input type="number" id="protein" placeholder="0" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="carbs">Carbs (g)</label>
                        <input type="number" id="carbs" placeholder="0" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="fiber">Fiber (g)</label>
                        <input type="number" id="fiber" placeholder="0" min="0" required>
                    </div>
                    <div class="input-group">
                        <label for="fat">Fat (g)</label>
                        <input type="number" id="fat" placeholder="0" min="0" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="ingredients">Ingredients List</label>
                    <textarea id="ingredients" rows="5" placeholder="Paste ingredients here... (e.g. Water, Sugar, Red 40...)"></textarea>
                </div>

                <button id="calculate-btn" class="primary-btn">
                    <span>Calculate Score</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"></path><path d="M12 5l7 7-7 7"></path></svg>
                </button>
            </div>

            <div class="results-panel glass-panel" id="results-panel" style="display: none;">
                <h2>Health Score</h2>
                
                <div class="score-display">
                    <div class="score-circle">
                        <span id="final-score">10</span>
                        <span class="score-max">/10</span>
                    </div>
                    <p id="score-message" class="score-message">Perfect Score!</p>
                </div>

                <div class="breakdown">
                    <h3>Analysis Breakdown</h3>
                    
                    <div class="breakdown-item">
                        <div class="breakdown-header">
                            <span>Macro & Calorie Check</span>
                            <span id="macro-score" class="badge neutral">Base: 10</span>
                        </div>
                        <div class="score-details glass-panel">
                    <h3>Macro Balance</h3>
                    <div class="macro-bar-container">
                        <div id="macro-bar" class="macro-bar"></div>
                    </div>
                </div>

                <div id="breakdown-panel" class="score-details glass-panel">
                    <h3>Score Breakdown</h3>
                    <ul id="breakdown-list" class="breakdown-list"></ul>
                </div>
                </div>
                
                <button id="reset-btn" class="secondary-btn">New Calculation</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker failed', err));
            });
        }
    </script>
</body>
</html>
